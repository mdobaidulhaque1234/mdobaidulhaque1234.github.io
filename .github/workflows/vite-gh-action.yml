name: Deploy Vite App to GitHub Pages

on:
  push:
    branches:
      - main  # Change this if your branch is different

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18  # Use the Node.js version you need

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        env:
          VITE_BASE: /your-repo-name/  # Replace with your repo name if needed

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./dist  # Ensure this matches your Vite build output folder

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v2
